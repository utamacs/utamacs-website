<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - UTA MACS</title>
  <meta name="description" content="Login to your UTA MACS member account - Urban Trilla Apartment Owners Mutually Aided Cooperative Maintenance Society Limited">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://kit.fontawesome.com/5a2b2f0b4f.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gradient-to-br from-gray-50 to-primary-50 text-gray-900 min-h-screen">
  <header id="header-placeholder"></header>

  <main class="container mx-auto px-4 py-16">
    <div class="max-w-md mx-auto">
      <div class="text-center mb-8">
        <i class="fas fa-building text-4xl text-primary-600 mb-4"></i>
        <h1 class="text-3xl font-bold text-gray-900 mb-2">Welcome to UTA MACS</h1>
        <p class="text-gray-600">Sign in to your member account</p>
      </div>

      <div class="glass-card p-8 rounded-2xl shadow-xl">
        <form class="space-y-6">
          <div>
            <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
              <i class="fas fa-envelope mr-2"></i>Email Address
            </label>
            <input type="email" id="email" name="email" required
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent transition duration-200"
                   placeholder="your@email.com">
          </div>

          <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
              <i class="fas fa-lock mr-2"></i>Password
            </label>
            <input type="password" id="password" name="password" required
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent transition duration-200"
                   placeholder="Enter your password">
          </div>

          <div class="flex items-center justify-between">
            <label class="flex items-center">
              <input type="checkbox" class="rounded border-gray-300 text-primary-600 focus:ring-primary-500">
              <span class="ml-2 text-sm text-gray-600">Remember me</span>
            </label>
            <a href="#" class="text-sm text-primary-600 hover:text-primary-800">Forgot password?</a>
          </div>

          <button type="submit" class="btn-modern w-full">
            <i class="fas fa-sign-in-alt mr-2"></i>
            Sign In
          </button>
        </form>

        <div class="mt-6 text-center">
          <p class="text-gray-600">
            Don't have an account?
            <a href="pages/contact.html" class="text-primary-600 hover:text-primary-800 font-medium">Contact us to join</a>
          </p>
        </div>
      </div>

      <div class="text-center mt-8">
        <a href="index.html" class="text-primary-600 hover:text-primary-800">
          <i class="fas fa-arrow-left mr-2"></i>
          Back to Home
        </a>
      </div>
    </div>
  </main>

  <footer id="footer-placeholder"></footer>

  <script src="js/main.js"></script>
</body>
</html>
