<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UTA MACS Website Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://kit.fontawesome.com/5a2b2f0b4f.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-background text-text-primary">
  <div class="container mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold text-primary-600 mb-8">UTA MACS Website Test</h1>

    <!-- Test Components Loading -->
    <div class="mb-8">
      <h2 class="text-xl font-semibold mb-4">Component Loading Test</h2>
      <div id="header-placeholder" class="border border-gray-300 p-4 mb-4">
        <p>Loading navigation...</p>
      </div>
      <div id="footer-placeholder" class="border border-gray-300 p-4">
        <p>Loading footer...</p>
      </div>
    </div>

    <!-- Test Design System -->
    <div class="mb-8">
      <h2 class="text-xl font-semibold mb-4">Design System Test</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="card-premium p-6">
          <h3 class="text-lg font-semibold text-primary-600 mb-2">Primary Color</h3>
          <div class="w-full h-8 bg-primary-600 rounded"></div>
        </div>
        <div class="card-premium p-6">
          <h3 class="text-lg font-semibold text-secondary-600 mb-2">Secondary Color</h3>
          <div class="w-full h-8 bg-secondary-600 rounded"></div>
        </div>
        <div class="card-premium p-6">
          <h3 class="text-lg font-semibold text-accent-600 mb-2">Accent Color</h3>
          <div class="w-full h-8 bg-accent-600 rounded"></div>
        </div>
      </div>
    </div>

    <!-- Test Buttons -->
    <div class="mb-8">
      <h2 class="text-xl font-semibold mb-4">Button Components Test</h2>
      <div class="flex flex-wrap gap-4">
        <button class="btn-primary">Primary Button</button>
        <button class="btn-secondary">Secondary Button</button>
        <button class="btn-accent">Accent Button</button>
        <button class="btn-outline">Outline Button</button>
      </div>
    </div>

    <!-- Test Theme Toggle -->
    <div class="mb-8">
      <h2 class="text-xl font-semibold mb-4">Theme Toggle Test</h2>
      <button id="theme-toggle" class="btn-outline">
        <i class="fas fa-moon"></i>
        Toggle Theme
      </button>
    </div>

    <!-- Console Output -->
    <div class="mb-8">
      <h2 class="text-xl font-semibold mb-4">Console Output</h2>
      <div id="console-output" class="bg-gray-100 dark:bg-gray-800 p-4 rounded font-mono text-sm max-h-40 overflow-y-auto">
        Test initialized...
      </div>
    </div>
  </div>

  <!-- Load JavaScript -->
  <script src="js/main.js"></script>

  <!-- Test Script -->
  <script>
    // Override console.log to display in the test page
    const originalLog = console.log;
    const consoleOutput = document.getElementById('console-output');

    console.log = function(...args) {
      originalLog.apply(console, args);
      const message = args.join(' ') + '\n';
      consoleOutput.textContent += message;
      consoleOutput.scrollTop = consoleOutput.scrollHeight;
    };

    // Test component loading
    setTimeout(() => {
      console.log('Testing component loading...');
      const nav = document.querySelector('#header-placeholder .nav');
      const footer = document.querySelector('#footer-placeholder .footer');

      if (nav) {
        console.log('✅ Navigation component loaded successfully');
      } else {
        console.log('❌ Navigation component failed to load');
      }

      if (footer) {
        console.log('✅ Footer component loaded successfully');
      } else {
        console.log('❌ Footer component failed to load');
      }

      // Test theme toggle
      const themeToggle = document.getElementById('theme-toggle');
      if (themeToggle) {
        console.log('✅ Theme toggle found');
        themeToggle.addEventListener('click', () => {
          console.log('Theme toggled');
        });
      } else {
        console.log('❌ Theme toggle not found');
      }

      console.log('Test completed!');
    }, 2000);
  </script>
</body>
</html>
